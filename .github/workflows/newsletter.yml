name: Stryktipset Newsletter

on:
  # Every Saturday at 06:30 UTC = 07:30 Stockholm (CET, winter) / 08:30 (CEST, summer)
  # CEST runs late March–late October. Pipeline takes ~20 min. Coupon closes ~15:59.
  schedule:
    - cron: "30 6 * * 6"

  # Manual trigger — also lets you specify a draw number for testing/backfill
  workflow_dispatch:
    inputs:
      draw_number:
        description: "Draw number to run (leave blank for current week)"
        required: false
        type: string
      dry_run:
        description: "Dry run — generate HTML but don't send email"
        required: false
        type: boolean
        default: false

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit prediction data back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push works correctly
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip dependencies — speeds up subsequent runs significantly
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Build the CLI arguments based on inputs
      - name: Build run arguments
        id: args
        run: |
          ARGS="--run"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          if [ -n "${{ github.event.inputs.draw_number }}" ]; then
            ARGS="$ARGS --draw ${{ github.event.inputs.draw_number }}"
          fi
          echo "cli_args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run newsletter pipeline
        run: python main.py ${{ steps.args.outputs.cli_args }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      # Upload the dry-run HTML as a downloadable artifact (useful for previewing)
      - name: Upload dry-run HTML
        if: github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-preview
          path: newsletter_draw_*.html
          retention-days: 7

      # Commit prediction data and performance history back to the repo.
      # This is how we persist our long-term model improvement data.
      # Only runs when not a dry run and there are actual changes to commit.
      - name: Commit prediction data
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "stryktipset-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/predictions/ data/results/ data/performance/ data/xg/ data/newsletters/
          # Only commit if there are staged changes
          if git diff --staged --quiet; then
            echo "No new prediction data to commit."
          else
            git commit -m "data: weekly predictions and evaluations $(date -u '+%Y-%m-%d')"
            git push
          fi

      # Ping Healthchecks.io — if this ping doesn't arrive by the grace deadline,
      # Healthchecks.io emails an alert. Dead man's switch pattern.
      - name: Ping health check (success)
        if: success() && secrets.HC_NEWSLETTER_PING_URL != ''
        run: curl -fsS -m 10 --retry 3 "${{ secrets.HC_NEWSLETTER_PING_URL }}"

      - name: Ping health check (failure)
        if: failure() && secrets.HC_NEWSLETTER_PING_URL != ''
        run: curl -fsS -m 10 --retry 3 "${{ secrets.HC_NEWSLETTER_PING_URL }}/fail"
